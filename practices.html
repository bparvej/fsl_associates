<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Practices - Fair & Square Legal Associates</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .practice-card {
            background: #222;
            padding: 30px;
            border-radius: 8px;
            border-top: 4px solid var(--accent);
            transition: var(--transition);
        }
        .practice-card:hover {
            transform: translateY(-10px);
            background: #2a2a2a;
        }
        .practice-card i {
            font-size: 32px;
            color: var(--accent);
            margin-bottom: 20px;
        }
        .practice-card h3 {
            margin-bottom: 15px;
            font-size: 22px;
        }
        .practice-card p {
            color: var(--text-muted);
            font-size: 15px;
        }
    </style>
</head>
<body>
    <div id="header-placeholder"></div>

    <section class="hero" style="height: 40vh; background-image: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('assets/hero-bg.png');">
        <h1 class="hero-title">Practices</h1>
    </section>

    <section>
        <div class="container">
            <div style="max-width: 800px; margin: 0 auto 60px; text-align: center;">
                <h2 class="serif">Practise page retired</h2>
                <p class="animate-on-scroll" style="font-size: 20px; color: var(--text-muted);">This page has been replaced by the current navigation structure. Please use the Practise menu in the header to select Family Law, Criminal Law, Civil Law, Business Law and Misc.</p>
                <p>Or use <a href="about-us.html" style="color: var(--accent);">About Us</a> and <a href="faq.html" style="color: var(--accent);">FAQ</a> for updated guidance.</p>
            </div>
        </div>
    </section>

    <div id="footer-placeholder"></div>

    <script src="js/main.js"></script>
</body>
</html>
